<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML5 Drag-and-Drop Project | Valentina Miranda, 2026</title>
	<script>
function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
  ev.preventDefault();
  var data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}
</script>
<style type="text/css">
body {
	margin: 0;
	background-color: #FFD8F0;
}
wrapper  {
	width: 1920px;
	margin: auto;
	display: block;
}
wrapper div {
	width: 900px;
	border: thin solid black;
	height: 600px;
	margin-top: 25px;
	margin-right: 25px;
	margin-left: 25px;
	margin-bottom: 25px;
	display: inline-block;
	vertical-align: top;
}
div img {
	width: 70%;
	height: auto;
}
h1 {
	text-align: center;
	font-family: "Gill Sans", "Gill Sans MT", "Myriad Pro", "DejaVu Sans Condensed", Helvetica, Arial, sans-serif;
	color: #FFFFFF;
}
</style>
</head>

<body>
<h1>Your Dress Up Game!</h1>
<wrapper>
  <div id="drop1" ondrop="drop(event)" ondragover="allowDrop(event)"><img src= "muneca.png" alt="" width="88" height="31" id="drag1" draggable="true" ondragstart="drag(event)"></div>
  <div id="drop2" ondrop="drop(event)" ondragover="allowDrop(event)"> </div>
  <div id="drop3" ondrop="drop(event)" ondragover="allowDrop(event)"><img src="ropamuneca.png" alt="" width="88" height="31" id="drag2" draggable="true" ondragstart="drag(event)"></div>
  <div id="drop4" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
</wrapper>
</body>
</html>
