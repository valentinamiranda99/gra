<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>gardening 101| valentina miranda, 2026</title>
	<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style type="text/css">
body {
	margin: 0;
	background-color: rgba(255,214,215,1.00);
}
wrapper {
	width: 80%;
	margin: auto;
	display: block;
	background-color: rgba(255,212,212,1.00);
}
header {
	height: 200px;
	background-color: rgba(84,197,101,1.00);
}
nav {
	background-color: rgba(162,255,167,1.00);
}
nav ul a {
	color: white;
	text-decoration: none;
}
ul a li {
	padding: 10px;
	list-style-type: none;
}
ul a li:hover {
	background-color: rgba(243,119,255,1.00);
}
nav ul {
	padding: 0;
	margin: 0;
}
#about {
	height: 600px;
	background-color: rgba(174,246,255,1.00);
}
#gallery {
	height: 600px;
	background-color: rgba(37,195,192,1.00);
}
#contact {
	height: 600px;
	background-color: rgba(54,197,46,1.00);
}
footer {
	height: 200px;
	background-color: rgba(174,172,255,1.00);
}
	.topnav.responsive a{
    display:block;
}
.topnav.responsive a:not(:first-child) {
     display: none;
	}
.topnav .fa-times {
    display: block;
	padding:10px;
	color:white;
}

	.topnav .fa-bars {
    display: none;
}
	.topnav.responsive .fa-times {
    display: none;
		
}
	.topnav.responsive .fa-bars {
    display: block;
	padding:10px;
		color:white;
		
}
@media (min-width:600px) {
.topnav a:not(:first-child),.topnav.responsive a:not(:first-child) {
    display:inline-block;
     }
.topnav .icon {
     display:none;
     }
}	
</style>
	<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}
</script>
</head>

<body>
<wrapper>
	
  <header></header>
	
  <nav class="topnav" id="myTopnav">
  <a href="javascript:void(0);" class="icon"
     onclick="myFunction()">
  <i class="fa fa-bars"></i><i class="fa fa-times"></i>
	<ul>
		<a href="#about"><li>about</li></a>
		<a href="#gallery"><li>gallery</li></a>
		<a href="#contact"><li>contact</li></a>
	</ul>
	 </a>
  </nav>
	 <div id="about"></div>
	
  <section id="gallery"></section>
  <section id="contact"></section>
	
<footer></footer>
	
</wrapper>
</body>
</html>
